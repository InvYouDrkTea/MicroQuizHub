<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>测验作答 - MicroQuizHub</title>
    <link rel="icon" type="image/png" href="/asset/icon.png">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://unpkg.com/fabric-with-erasing@1.0.1/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="/asset/style.css">
</head>
<body>
    <!-- 页面结构保持不变（与提问中相同） -->
    <div class="token-container" id="tokenContainer">
        <h2 class="token-title">测验作答</h2>
        <div id="quizStatusMessage" class="quiz-status-message info">正在校验测验数据</div>
        <div id="tokenInputArea" style="display: none;">
            <div class="token-input">
                <label for="tokenInput">访问令牌：</label>
                <input type="text" id="tokenInput" placeholder="请输入访问令牌">
            </div>
            <button class="token-btn" id="tokenBtn">验证</button>
        </div>
    </div>
    <div class="loading-container" id="loadingContainer" style="display: none;">
        <div class="loading-spinner"></div>
        <p>正在加载试题</p>
    </div>
    <div class="main-container" id="mainContainer">
        <div class="questions-panel">
            <div class="questions-container" id="questionsContainer">
                <div class="question-content" id="questionContent"></div>
            </div>
        </div>
        <div class="answer-panel">
            <div class="answers-container" id="answersContainer">
                <h2 class="panel-title">请在此区域作答</h2>
                <div id="autoSaveStatus" class="auto-save-status" style="display: none;"></div>
                <div id="answerItemsContainer"></div>
                <div class="submit-area">
                    <button class="submit-btn" id="submitBtn" disabled>提交</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-title">确认提交</div>
            <div class="modal-message" id="confirmModalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancelBtn">取消</button>
                <button class="modal-btn confirm" id="modalConfirmBtn">提交</button>
            </div>
        </div>
    </div>

    <script>
        (function(){
            // ----- 全局变量 -----
            let quizId = '';
            let tokenValue = '';
            let quizConfig = null;
            let answerSheet = [];
            let userAnswers = [];
            let paperContentUrl = '';
            let paperMimeType = '';
            let allowResubmit = false;
            let autoSaveInterval = null;
            
            const graphicInstances = new Map();
            
            const tokenContainer = document.getElementById('tokenContainer');
            const loadingContainer = document.getElementById('loadingContainer');
            const mainContainer = document.getElementById('mainContainer');
            const tokenInput = document.getElementById('tokenInput');
            const tokenBtn = document.getElementById('tokenBtn');
            const questionContent = document.getElementById('questionContent');
            const answerItemsContainer = document.getElementById('answerItemsContainer');
            const submitBtn = document.getElementById('submitBtn');
            const quizStatusMessageDiv = document.getElementById('quizStatusMessage');
            const tokenInputArea = document.getElementById('tokenInputArea');
            const autoSaveStatusDiv = document.getElementById('autoSaveStatus');
            
            const confirmModal = document.getElementById('confirmModal');
            const modalCancelBtn = document.getElementById('modalCancelBtn');
            const modalConfirmBtn = document.getElementById('modalConfirmBtn');
            const confirmModalMessage = document.getElementById('confirmModalMessage');

            function showNotification(message, type) {
                const existing = document.querySelector('.notification');
                if (existing) existing.remove();
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }
            
            function updateAutoSaveStatus(success) {
                if (!autoSaveStatusDiv) return;
                if (success) {
                    autoSaveStatusDiv.style.display = 'none';
                    autoSaveStatusDiv.textContent = '';
                } else {
                    const now = new Date();
                    const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                    autoSaveStatusDiv.textContent = `${timeStr} 自动保存失败`;
                    autoSaveStatusDiv.style.display = 'block';
                }
            }
            
            function renderMath(element) {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(element, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\(", right: "\\)", display: false},
                            {left: "\\[", right: "\\]", display: true}
                        ],
                        throwOnError: false
                    });
                }
            }
            
            function normalizeQuizConfig(data) {
                if (typeof data.id !== 'string' || typeof data.paper !== 'string' || data.paper.trim() === '') {
                    return null;
                }
                const group = (data.hasOwnProperty('group') && data.group !== null && typeof data.group === 'string') ? data.group : null;
                // 修改：如果 group 为 null，强制 allow_resubmit 为 true
                let allowResubmit;
                if (group === null) {
                    allowResubmit = true;
                } else {
                    allowResubmit = (data.hasOwnProperty('allow_resubmit') && typeof data.allow_resubmit === 'boolean') ? data.allow_resubmit : false;
                }
                return {
                    id: data.id,
                    paper: data.paper,
                    group: group,
                    deadline: (data.hasOwnProperty('deadline') && data.deadline !== null) ? Number(data.deadline) : null,
                    allow_resubmit: allowResubmit
                };
            }
            
            async function fetchQuizConfig() {
                const urlParams = new URLSearchParams(window.location.search);
                quizId = urlParams.get('quiz');
                if (!quizId) {
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = '未选择测验';
                    tokenInputArea.style.display = 'none';
                    tokenBtn.disabled = true;
                    return false;
                }
                try {
                    const response = await fetch(`/quiz/${quizId}`);
                    if (response.status === 404) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '测验不存在';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    } else if (response.status === 500) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '服务器异常';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    } else if (!response.ok) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '测验数据获取失败';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    }
                    const data = await response.json();
                    const normalized = normalizeQuizConfig(data);
                    if (!normalized) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '测验数据异常';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    }
                    quizConfig = normalized;
                    allowResubmit = quizConfig.allow_resubmit;
                    
                    if (quizConfig.deadline !== null && !isNaN(quizConfig.deadline)) {
                        if (Date.now() > quizConfig.deadline * 1000) {
                            quizStatusMessageDiv.className = 'quiz-status-message';
                            quizStatusMessageDiv.textContent = '测验已截止';
                            tokenInputArea.style.display = 'none';
                            tokenBtn.disabled = true;
                            return false;
                        }
                    }
                    
                    quizStatusMessageDiv.style.display = 'none';
                    
                    if (quizConfig.group === null) {
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        tokenValue = '';
                        await onTokenVerified();
                        return true;
                    }
                    
                    tokenInputArea.style.display = 'block';
                    tokenBtn.disabled = false;
                    return true;
                } catch (err) {
                    console.error('Fetch quiz config error:', err);
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = '测验数据异常';
                    tokenInputArea.style.display = 'none';
                    tokenBtn.disabled = true;
                    return false;
                }
            }
            
            async function postRequest(url, payload, operationName, showSuccessNotification = true) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.status === 400) {
                        showNotification(`${operationName}失败：请求异常`, 'error');
                        return { success: false, code: -1 };
                    }
                    if (response.status === 500) {
                        showNotification(`${operationName}失败：服务器异常`, 'error');
                        return { success: false, code: -1 };
                    }
                    if (!response.ok) {
                        showNotification(`${operationName}失败：请求异常`, 'error');
                        return { success: false, code: -1 };
                    }
                    const result = await response.json();
                    const code = result.code;
                    if (code === 0) {
                        if (showSuccessNotification) {
                            showNotification(`${operationName}成功`, 'success');
                        }
                        return { success: true, code: 0 };
                    } else if (code === 1) {
                        if (operationName === '验证') {
                            showNotification('访问令牌无效', 'error');
                        } else {
                            showNotification(`${operationName}失败：不允许重复提交`, 'error');
                        }
                        return { success: false, code: 1 };
                    } else if (code === 2) {
                        if (operationName === '验证') {
                            showNotification('你已提交', 'error');
                        } else {
                            showNotification(`${operationName}失败：不允许重复提交`, 'error');
                        }
                        return { success: false, code: 2 };
                    } else if (code === 3) {
                        showNotification(`${operationName}失败：测验已截止`, 'error');
                        return { success: false, code: 3 };
                    } else {
                        showNotification(`${operationName}失败：数据异常`, 'error');
                        return { success: false, code: -1 };
                    }
                } catch (err) {
                    console.error('POST request error:', err);
                    showNotification(`${operationName}失败：${err.message}`, 'error');
                    return { success: false, code: -1 };
                }
            }
            
            async function verifyToken(token) {
                if (quizConfig.group === null) return true;
                const result = await postRequest('/verify', { quiz: quizId, token: token }, '验证', false);
                return result.success;
            }
            
            async function autoVerifyToken(token) {
                if (quizConfig.group === null) return { success: true };
                try {
                    const response = await fetch('/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ quiz: quizId, token: token })
                    });
                    if (response.status === 400 || response.status === 404) {
                        return { success: false, code: 1 };
                    }
                    if (!response.ok) {
                        return { success: false, code: -1 };
                    }
                    const result = await response.json();
                    if (result.code === 0) return { success: true };
                    else if (result.code === 1) return { success: false, code: 1 };
                    else if (result.code === 2) return { success: false, code: 2 };
                    else if (result.code === 3) return { success: false, code: 3 };
                    else return { success: false, code: -1 };
                } catch (err) {
                    console.error('Auto verify error:', err);
                    return { success: false, code: -1 };
                }
            }
            
            async function fetchPaperConfig(paperId) {
                try {
                    const response = await fetch(`/paper/${paperId}`);
                    if (response.status === 500) throw new Error('Server error (500)');
                    if (!response.ok) {
                        if (response.status === 404) throw new Error('Paper data error: 404');
                        throw new Error(`Paper data error: HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    if (!data.hasOwnProperty('content') || typeof data.content !== 'string' || data.content.trim() === '')
                        throw new Error('Paper data error: missing content field');
                    if (!data.hasOwnProperty('mime_type') || !['text/markdown', 'application/pdf'].includes(data.mime_type))
                        throw new Error('Paper data error: missing or unsupported mime_type');
                    if (!data.hasOwnProperty('paper') || !Array.isArray(data.paper))
                        throw new Error('Paper data error: missing or invalid paper field');
                    for (let i = 0; i < data.paper.length; i++) {
                        const item = data.paper[i];
                        if (!item.type || !['single_selection', 'multiple_selection', 'single_line', 'multiple_line', 'graphic'].includes(item.type))
                            throw new Error(`Paper data error: invalid type for question ${i+1}`);
                        if (typeof item.prompt !== 'string')
                            throw new Error(`Paper data error: missing prompt for question ${i+1}`);
                        if ((item.type === 'single_selection' || item.type === 'multiple_selection') && (!Array.isArray(item.option) || item.option.length === 0))
                            throw new Error(`Paper data error: missing options for question ${i+1}`);
                        if (item.type === 'graphic') {
                            if (!item.hasOwnProperty('prototype')) item.prototype = null;
                            if (!item.hasOwnProperty('mime_type')) item.mime_type = 'image/png'; // 仅用于背景图
                        }
                    }
                    return data;
                } catch (err) {
                    if (err.message.startsWith('Paper data error')) throw err;
                    else throw new Error(`Request error: ${err.message}`);
                }
            }
            
            async function fetchPaperContent(url, mimeType) {
                if (mimeType === 'text/markdown') {
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Failed to load paper content: HTTP ${resp.status}`);
                    return await resp.text();
                } else if (mimeType === 'application/pdf') {
                    return url;
                } else {
                    throw new Error(`Unsupported paper format: ${mimeType}`);
                }
            }
            
            function renderPaperContent(contentData, mimeType) {
                questionContent.innerHTML = '';
                if (mimeType === 'text/markdown' && typeof contentData === 'string') {
                    questionContent.innerHTML = typeof marked !== 'undefined' ? marked.parse(contentData) : `<pre>${contentData}</pre>`;
                    renderMath(questionContent);
                } else if (mimeType === 'application/pdf' && typeof contentData === 'string') {
                    const iframe = document.createElement('iframe');
                    iframe.src = contentData;
                    iframe.className = 'pdf-embed';
                    iframe.setAttribute('frameborder', '0');
                    questionContent.appendChild(iframe);
                } else {
                    questionContent.innerHTML = '<div class="unsupported-format">当前试卷格式不支持预览</div>';
                    throw new Error('Render failed: unsupported paper format');
                }
            }
            
            function renderGraphic(container, item, index) {
                const graphicDiv = document.createElement('div');
                graphicDiv.className = 'graphic-container';
                
                const toolbar = document.createElement('div');
                toolbar.className = 'graphic-toolbar';
                
                const createToolButton = (text, title, active = false) => {
                    const btn = document.createElement('button');
                    btn.textContent = text;
                    btn.title = title;
                    if (active) btn.classList.add('active');
                    return btn;
                };
                
                const btnSelect = createToolButton('选择', '选择/移动对象 (V)');
                const btnDraw = createToolButton('画笔', '自由绘制 (P)', true);
                const btnErase = createToolButton('擦除', '擦除 (E)');          // 新增擦除按钮
                const btnLine = createToolButton('直线', '绘制直线 (L)');
                const btnRect = createToolButton('矩形', '绘制矩形 (R)');
                const btnCircle = createToolButton('圆形', '绘制圆形 (C)');
                const btnText = createToolButton('文本', '添加文本 (T)');
                
                const colorPicker = document.createElement('input');
                colorPicker.type = 'color';
                colorPicker.value = '#000000';
                colorPicker.title = '颜色';
                
                const strokeWidthInput = document.createElement('input');
                strokeWidthInput.type = 'range';
                strokeWidthInput.min = '1';
                strokeWidthInput.max = '20';
                strokeWidthInput.value = '3';
                strokeWidthInput.title = '线宽';
                
                const btnUndo = createToolButton('↩', '撤销 (Ctrl+Z)');
                const btnRedo = createToolButton('↪', '重做 (Ctrl+Y)');
                const btnClear = createToolButton('清空', '清空画布');
                
                const group1 = document.createElement('span');
                group1.className = 'toolbar-group';
                group1.append(btnSelect, btnDraw, btnErase, btnLine, btnRect, btnCircle, btnText);
                
                const group2 = document.createElement('span');
                group2.className = 'toolbar-group';
                group2.append(colorPicker, strokeWidthInput);
                
                const group3 = document.createElement('span');
                group3.className = 'toolbar-group';
                group3.append(btnUndo, btnRedo, btnClear);
                
                toolbar.append(group1, group2, group3);
                graphicDiv.appendChild(toolbar);
                
                const wrapper = document.createElement('div');
                wrapper.className = 'graphic-canvas-wrapper';
                
                const canvasEl = document.createElement('canvas');
                canvasEl.className = 'graphic-canvas';
                // 初始尺寸（无背景图时使用）
                canvasEl.width = 600;
                canvasEl.height = 400;
                
                wrapper.appendChild(canvasEl);
                graphicDiv.appendChild(wrapper);
                container.appendChild(graphicDiv);
                
                const canvas = new fabric.Canvas(canvasEl, {
                    selection: true,
                    preserveObjectStacking: true
                });
                
                graphicInstances.set(index, canvas);
                
                // ---------- 历史记录管理 ----------
                let history = [];
                let historyIndex = -1;
                let ignoreSave = false;
                let backgroundImage = null;
                
                function saveState() {
                    if (ignoreSave) return;
                    const bg = canvas.backgroundImage;
                    canvas.backgroundImage = null;
                    const json = canvas.toJSON();
                    canvas.backgroundImage = bg;
                    
                    if (historyIndex < history.length - 1) {
                        history = history.slice(0, historyIndex + 1);
                    }
                    history.push(json);
                    historyIndex++;
                    updateUndoRedoButtons();
                }
                
                function loadState(stateJson) {
                    ignoreSave = true;
                    const bg = canvas.backgroundImage;
                    canvas.loadFromJSON(stateJson, () => {
                        if (bg) {
                            canvas.setBackgroundImage(bg, canvas.renderAll.bind(canvas));
                        } else {
                            canvas.renderAll();
                        }
                        ignoreSave = false;
                        updateUndoRedoButtons();
                    });
                }
                
                function undo() {
                    if (historyIndex > 0) {
                        historyIndex--;
                        loadState(history[historyIndex]);
                    }
                }
                
                function redo() {
                    if (historyIndex < history.length - 1) {
                        historyIndex++;
                        loadState(history[historyIndex]);
                    }
                }
                
                function updateUndoRedoButtons() {
                    btnUndo.disabled = (historyIndex <= 0);
                    btnRedo.disabled = (historyIndex >= history.length - 1);
                }
                
                function clearCanvas() {
                    canvas.getObjects().forEach(obj => {
                        if (obj !== canvas.backgroundImage) canvas.remove(obj);
                    });
                    canvas.renderAll();
                    saveState();
                }
                
                // 初始化保存
                saveState();
                
                canvas.on('object:added', saveState);
                canvas.on('object:modified', saveState);
                canvas.on('object:removed', saveState);
                canvas.on('path:created', saveState);
                
                btnUndo.addEventListener('click', undo);
                btnRedo.addEventListener('click', redo);
                btnClear.addEventListener('click', clearCanvas);
                
                // ---------- 擦除工具初始化 ----------
                // 创建橡皮擦画笔实例
                const eraserBrush = new fabric.EraserBrush(canvas);
                // 初始时画笔为普通自由绘制画笔
                canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                canvas.freeDrawingBrush.color = colorPicker.value;
                canvas.freeDrawingBrush.width = parseInt(strokeWidthInput.value, 10);
                
                // 颜色/线宽变化时更新普通画笔（橡皮擦不受影响）
                colorPicker.addEventListener('change', () => {
                    if (!(canvas.freeDrawingBrush instanceof fabric.EraserBrush)) {
                        canvas.freeDrawingBrush.color = colorPicker.value;
                    }
                });
                strokeWidthInput.addEventListener('input', () => {
                    if (!(canvas.freeDrawingBrush instanceof fabric.EraserBrush)) {
                        canvas.freeDrawingBrush.width = parseInt(strokeWidthInput.value, 10);
                    }
                });
                
                // ---------- 画布尺寸自适应 ----------
                function resizeCanvasToBackground(img) {
                    const naturalWidth = img.width;
                    const naturalHeight = img.height;
                    canvas.setDimensions({ width: naturalWidth, height: naturalHeight });
                    canvas.setZoom(1);
                    // 更新包装器高度以匹配画布实际高度（保持比例）
                    wrapper.style.height = naturalHeight + 'px';
                    // 若宽度超出容器，滚动条由 CSS 负责
                }
                
                function resizeCanvasToDefault() {
                    const containerWidth = wrapper.clientWidth;
                    canvas.setDimensions({ width: containerWidth, height: 400 });
                    canvas.setZoom(1);
                    wrapper.style.height = '400px';
                }
                
                // 监听窗口大小变化，无背景图时重新调整宽度
                let resizeObserver = null;
                if (typeof ResizeObserver !== 'undefined') {
                    resizeObserver = new ResizeObserver(() => {
                        if (!backgroundImage) {
                            resizeCanvasToDefault();
                            canvas.renderAll();
                        }
                    });
                    resizeObserver.observe(wrapper);
                } else {
                    // 降级方案：窗口 resize 事件
                    window.addEventListener('resize', () => {
                        if (!backgroundImage) {
                            resizeCanvasToDefault();
                            canvas.renderAll();
                        }
                    });
                }
                
                // 背景图加载
                if (item.prototype) {
                    fabric.Image.fromURL(item.prototype, (img) => {
                        img.set({
                            selectable: false,
                            evented: false,
                            hasControls: false,
                            lockMovementX: true,
                            lockMovementY: true,
                            hoverCursor: 'default',
                            erasable: false,
                        });
                        // 设置画布尺寸为图片原始尺寸
                        resizeCanvasToBackground(img);
                        canvas.setBackgroundImage(img, () => {
                            canvas.renderAll();
                            saveState(); // 带背景图状态
                        }, {
                            // 由于尺寸已匹配，无需缩放
                            scaleX: 1,
                            scaleY: 1
                        });
                        backgroundImage = img;
                    }, undefined, { crossOrigin: 'anonymous' });
                } else {
                    // 无背景图，使用默认尺寸
                    resizeCanvasToDefault();
                }
                
                // ---------- 绘图模式管理 ----------
                let currentMode = 'draw'; // draw, select, line, rect, circle, text, erase
                let isDrawing = false;
                let startPoint = null;
                let tempShape = null;
                
                const setActiveMode = (mode) => {
                    currentMode = mode;
                    [btnSelect, btnDraw, btnErase, btnLine, btnRect, btnCircle, btnText].forEach(btn => btn.classList.remove('active'));
                    if (mode === 'select') btnSelect.classList.add('active');
                    else if (mode === 'draw') btnDraw.classList.add('active');
                    else if (mode === 'erase') btnErase.classList.add('active');
                    else if (mode === 'line') btnLine.classList.add('active');
                    else if (mode === 'rect') btnRect.classList.add('active');
                    else if (mode === 'circle') btnCircle.classList.add('active');
                    else if (mode === 'text') btnText.classList.add('active');
                    
                    // 设置画布交互模式
                    if (mode === 'draw') {
                        canvas.isDrawingMode = true;
                        canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                        canvas.freeDrawingBrush.color = colorPicker.value;
                        canvas.freeDrawingBrush.width = parseInt(strokeWidthInput.value, 10);
                    } else if (mode === 'erase') {
                        canvas.isDrawingMode = true;
                        canvas.freeDrawingBrush = eraserBrush;
                        // 橡皮擦宽度可用滑块调整
                        eraserBrush.width = parseInt(strokeWidthInput.value, 10);
                    } else {
                        canvas.isDrawingMode = false;
                    }
                    
                    canvas.selection = (mode === 'select');
                    canvas.forEachObject(obj => obj.selectable = (mode === 'select'));
                    canvas.renderAll();
                };
                
                // 滑块变化时同步更新橡皮擦宽度
                strokeWidthInput.addEventListener('input', () => {
                    const w = parseInt(strokeWidthInput.value, 10);
                    if (canvas.freeDrawingBrush instanceof fabric.EraserBrush) {
                        eraserBrush.width = w;
                    }
                });
                
                btnSelect.addEventListener('click', () => setActiveMode('select'));
                btnDraw.addEventListener('click', () => setActiveMode('draw'));
                btnErase.addEventListener('click', () => setActiveMode('erase'));
                btnLine.addEventListener('click', () => setActiveMode('line'));
                btnRect.addEventListener('click', () => setActiveMode('rect'));
                btnCircle.addEventListener('click', () => setActiveMode('circle'));
                btnText.addEventListener('click', () => setActiveMode('text'));
                
                // 绘图事件（直线、矩形、圆形）
                const getCurrentStyle = () => ({
                    stroke: colorPicker.value,
                    strokeWidth: parseInt(strokeWidthInput.value, 10),
                    fill: 'transparent'
                });
                
                canvas.on('mouse:down', (opt) => {
                    if (currentMode === 'select' || currentMode === 'draw' || currentMode === 'erase') return;
                    const pointer = canvas.getPointer(opt.e);
                    startPoint = { x: pointer.x, y: pointer.y };
                    isDrawing = true;
                    
                    const style = getCurrentStyle();
                    if (currentMode === 'line') {
                        tempShape = new fabric.Line([pointer.x, pointer.y, pointer.x, pointer.y], {
                            stroke: style.stroke,
                            strokeWidth: style.strokeWidth,
                            selectable: false,
                            evented: false
                        });
                    } else if (currentMode === 'rect') {
                        tempShape = new fabric.Rect({
                            left: pointer.x,
                            top: pointer.y,
                            width: 0,
                            height: 0,
                            stroke: style.stroke,
                            strokeWidth: style.strokeWidth,
                            fill: 'transparent',
                            selectable: false,
                            evented: false
                        });
                    } else if (currentMode === 'circle') {
                        tempShape = new fabric.Circle({
                            left: pointer.x,
                            top: pointer.y,
                            radius: 0,
                            stroke: style.stroke,
                            strokeWidth: style.strokeWidth,
                            fill: 'transparent',
                            selectable: false,
                            evented: false
                        });
                    }
                    if (tempShape) {
                        canvas.add(tempShape);
                    }
                });
                
                canvas.on('mouse:move', (opt) => {
                    if (!isDrawing || !tempShape) return;
                    const pointer = canvas.getPointer(opt.e);
                    if (currentMode === 'line') {
                        tempShape.set({ x2: pointer.x, y2: pointer.y });
                    } else if (currentMode === 'rect') {
                        tempShape.set({
                            width: Math.abs(pointer.x - startPoint.x),
                            height: Math.abs(pointer.y - startPoint.y)
                        });
                        if (pointer.x < startPoint.x) tempShape.set({ left: pointer.x });
                        if (pointer.y < startPoint.y) tempShape.set({ top: pointer.y });
                    } else if (currentMode === 'circle') {
                        const radius = Math.sqrt(Math.pow(pointer.x - startPoint.x, 2) + Math.pow(pointer.y - startPoint.y, 2));
                        tempShape.set({ radius: radius });
                    }
                    canvas.renderAll();
                });
                
                canvas.on('mouse:up', () => {
                    if (isDrawing && tempShape) {
                        tempShape.set({ selectable: true, evented: true });
                        canvas.setActiveObject(tempShape);
                        tempShape = null;
                    }
                    isDrawing = false;
                    startPoint = null;
                });
                
                // 文本工具：双击添加文本
                canvas.on('mouse:dblclick', (opt) => {
                    if (currentMode !== 'text') return;
                    const pointer = canvas.getPointer(opt.e);
                    const text = new fabric.IText('文本', {
                        left: pointer.x,
                        top: pointer.y,
                        fill: colorPicker.value,
                        fontSize: 20,
                        fontFamily: 'Microsoft YaHei'
                    });
                    canvas.add(text);
                    canvas.setActiveObject(text);
                    setActiveMode('select');
                });
                
                // 默认激活画笔模式
                setActiveMode('draw');
                updateUndoRedoButtons();
            }
            
            function renderAnswerSheetFromConfig() {
                answerItemsContainer.innerHTML = '';
                userAnswers = new Array(answerSheet.length);
                graphicInstances.clear();
                
                answerSheet.forEach((item, idx) => {
                    switch (item.type) {
                        case 'single_selection': userAnswers[idx] = null; break;
                        case 'multiple_selection': userAnswers[idx] = []; break;
                        case 'single_line':
                        case 'multiple_line': userAnswers[idx] = ''; break;
                        case 'graphic': userAnswers[idx] = null; break;
                        default: userAnswers[idx] = null;
                    }
                    const answerItem = document.createElement('div');
                    answerItem.className = 'answer-item';
                    answerItem.dataset.questionIndex = idx;
                    answerItem.dataset.questionType = item.type;
                    const title = document.createElement('div');
                    title.className = 'answer-item-title';
                    title.textContent = item.prompt;
                    answerItem.appendChild(title);
                    
                    if (item.type === 'single_selection') renderSingleSelection(answerItem, item, idx);
                    else if (item.type === 'multiple_selection') renderMultipleSelection(answerItem, item, idx);
                    else if (item.type === 'single_line') renderSingleLine(answerItem, item, idx);
                    else if (item.type === 'multiple_line') renderMultipleLine(answerItem, item, idx);
                    else if (item.type === 'graphic') renderGraphic(answerItem, item, idx);
                    
                    answerItemsContainer.appendChild(answerItem);
                });
            }
            
            function renderSingleSelection(container, item, index) {
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';
                (item.option || []).forEach((opt, optIdx) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'option';
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `question_${index}`;
                    radio.id = `question_${index}_option_${optIdx}`;
                    radio.value = optIdx;
                    radio.addEventListener('change', () => { if (radio.checked) userAnswers[index] = optIdx; });
                    const label = document.createElement('label');
                    label.htmlFor = radio.id;
                    label.textContent = opt;
                    optDiv.appendChild(radio);
                    optDiv.appendChild(label);
                    optionsDiv.appendChild(optDiv);
                });
                container.appendChild(optionsDiv);
            }
            
            function renderMultipleSelection(container, item, index) {
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';
                (item.option || []).forEach((opt, optIdx) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'option';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.name = `question_${index}`;
                    cb.id = `question_${index}_option_${optIdx}`;
                    cb.value = optIdx;
                    cb.addEventListener('change', () => {
                        if (cb.checked) userAnswers[index].push(optIdx);
                        else {
                            const pos = userAnswers[index].indexOf(optIdx);
                            if (pos > -1) userAnswers[index].splice(pos, 1);
                        }
                        userAnswers[index] = [...new Set(userAnswers[index])];
                    });
                    const label = document.createElement('label');
                    label.htmlFor = cb.id;
                    label.textContent = opt;
                    optDiv.appendChild(cb);
                    optDiv.appendChild(label);
                    optionsDiv.appendChild(optDiv);
                });
                container.appendChild(optionsDiv);
            }
            
            function renderSingleLine(container, item, index) {
                const wrapper = document.createElement('div');
                wrapper.className = 'single-line-container';
                const inputDiv = document.createElement('div');
                inputDiv.className = 'single-line-input';
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'text-input';
                input.placeholder = '请按LaTeX格式输入';
                input.addEventListener('input', () => {
                    userAnswers[index] = input.value;
                    updateFormulaPreview(`preview_single_${index}`, input.value, false);
                });
                const preview = document.createElement('div');
                preview.className = 'single-line-preview';
                preview.id = `preview_single_${index}`;
                inputDiv.appendChild(input);
                wrapper.appendChild(inputDiv);
                wrapper.appendChild(preview);
                container.appendChild(wrapper);
            }
            
            function renderMultipleLine(container, item, index) {
                const wrapper = document.createElement('div');
                wrapper.className = 'multiple-line-container';
                const inputDiv = document.createElement('div');
                inputDiv.className = 'multiple-line-input';
                const textarea = document.createElement('textarea');
                textarea.className = 'textarea-input';
                textarea.setAttribute('wrap', 'off');
                textarea.placeholder = '请按LaTeX格式输入，换行请输入\\newline';
                textarea.addEventListener('input', () => {
                    userAnswers[index] = textarea.value;
                    textarea.style.height = 'auto';
                    textarea.style.height = Math.max(80, textarea.scrollHeight) + 'px';
                    updateFormulaPreview(`preview_multiple_${index}`, textarea.value, true);
                });
                const preview = document.createElement('div');
                preview.className = 'multiple-line-preview';
                preview.id = `preview_multiple_${index}`;
                setTimeout(() => { textarea.style.height = '80px'; }, 10);
                inputDiv.appendChild(textarea);
                wrapper.appendChild(inputDiv);
                wrapper.appendChild(preview);
                container.appendChild(wrapper);
            }
            
            function updateFormulaPreview(previewId, latexCode, displayMode) {
                const preview = document.getElementById(previewId);
                if (!preview) return;
                preview.innerHTML = '';
                if (!latexCode) return;
                try {
                    if (typeof katex !== 'undefined')
                        katex.render(latexCode, preview, { throwOnError: false, displayMode });
                    else
                        preview.innerHTML = '<span style="color:#f44336;">LaTeX library not loaded</span>';
                } catch (e) {
                    preview.innerHTML = '<span style="color:#f44336;">LaTeX parse error</span>';
                }
            }
            
            function tryRestoreAnswers() {
                if (!quizId || !tokenValue) return false;
                const storageKey = `quiz_auto_save_${quizId}_${tokenValue}`;
                const saved = localStorage.getItem(storageKey);
                if (!saved) return false;
                try {
                    const data = JSON.parse(saved);
                    if (data.quizId === quizId && data.token === tokenValue && Array.isArray(data.answers) && data.answers.length === answerSheet.length) {
                        userAnswers = data.answers.slice();
                        for (let i = 0; i < answerSheet.length; i++) {
                            const answer = userAnswers[i];
                            const itemType = answerSheet[i].type;
                            const container = document.querySelector(`.answer-item[data-question-index="${i}"]`);
                            if (!container) continue;
                            
                            if (itemType === 'single_selection' && answer !== null && answer !== undefined) {
                                const radio = container.querySelector(`input[name="question_${i}"][value="${answer}"]`);
                                if (radio) radio.checked = true;
                            } else if (itemType === 'multiple_selection' && Array.isArray(answer)) {
                                answer.forEach(optIdx => {
                                    const checkbox = container.querySelector(`input[name="question_${i}"][value="${optIdx}"]`);
                                    if (checkbox) checkbox.checked = true;
                                });
                            } else if ((itemType === 'single_line' || itemType === 'multiple_line') && typeof answer === 'string') {
                                const input = container.querySelector(itemType === 'single_line' ? '.text-input' : '.textarea-input');
                                if (input) {
                                    input.value = answer;
                                    input.dispatchEvent(new Event('input', { bubbles: true }));
                                }
                            } else if (itemType === 'graphic' && answer && typeof answer === 'object' && answer.type === 'fabric') {
                                const canvas = graphicInstances.get(i);
                                if (canvas) {
                                    canvas.loadFromJSON(answer.data, () => {
                                        canvas.renderAll();
                                    });
                                }
                            }
                        }
                        updateAutoSaveStatus(true);
                        return true;
                    }
                } catch (e) {
                    console.warn('Failed to restore answers:', e);
                }
                return false;
            }
            
            function autoSaveAnswers() {
                if (!quizId || !tokenValue) return;
                const storageKey = `quiz_auto_save_${quizId}_${tokenValue}`;
                const answersForSave = userAnswers.map((ans, idx) => {
                    const item = answerSheet[idx];
                    if (item && item.type === 'graphic') {
                        const canvas = graphicInstances.get(idx);
                        if (canvas) {
                            return { type: 'fabric', data: canvas.toJSON() };
                        }
                        return null;
                    }
                    return ans;
                });
                
                const saveData = { quizId, token: tokenValue, answers: answersForSave, timestamp: Date.now() };
                try {
                    localStorage.setItem(storageKey, JSON.stringify(saveData));
                    updateAutoSaveStatus(true);
                } catch (e) {
                    console.error('Auto-save failed:', e);
                    updateAutoSaveStatus(false);
                }
            }
            
            function stopAutoSave() {
                if (autoSaveInterval) clearInterval(autoSaveInterval);
                autoSaveInterval = null;
            }
            
            function startAutoSave() {
                stopAutoSave();
                updateAutoSaveStatus(true);
                autoSaveInterval = setInterval(autoSaveAnswers, 30000);
            }
            
            async function performSubmit() {
                submitBtn.disabled = true;
                submitBtn.textContent = '正在提交';
                
                // 构建提交答案，graphic 题提交 PNG Base64 字符串
                const submitAnswers = [];
                for (let i = 0; i < userAnswers.length; i++) {
                    const item = answerSheet[i];
                    if (item && item.type === 'graphic') {
                        const canvas = graphicInstances.get(i);
                        if (canvas) {
                            // 导出为 PNG 格式的 Base64 字符串（包含背景图）
                            const dataURL = canvas.toDataURL('image/png');
                            submitAnswers.push(dataURL);
                        } else {
                            submitAnswers.push(null);
                        }
                    } else {
                        submitAnswers.push(userAnswers[i]);
                    }
                }
                
                const result = await postRequest('/submit', { quiz: quizId, token: tokenValue, answer: submitAnswers }, '提交', true);
                
                if (result.success) {
                    if (!allowResubmit) {
                        submitBtn.disabled = true;
                        submitBtn.textContent = '已提交';
                    } else {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '提交';
                    }
                    localStorage.removeItem(`quiz_auto_save_${quizId}_${tokenValue}`);
                    updateAutoSaveStatus(true);
                    stopAutoSave();
                } else {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交';
                }
            }
            
            function showConfirmModal() {
                if (submitBtn.disabled) return;
                confirmModalMessage.textContent = allowResubmit 
                    ? '当前测验允许重复提交，提交后仍可修改' 
                    : '当前测验不允许重复提交，提交后不可修改';
                confirmModal.style.display = 'flex';
            }
            
            function hideConfirmModal() {
                confirmModal.style.display = 'none';
            }
            
            function onConfirmSubmit() {
                hideConfirmModal();
                performSubmit();
            }
            
            async function onTokenVerified() {
                tokenContainer.style.display = 'none';
                loadingContainer.style.display = 'block';
                try {
                    const paperId = quizConfig.paper;
                    if (!paperId) throw new Error('Missing paper info');
                    const paperConf = await fetchPaperConfig(paperId);
                    answerSheet = paperConf.paper || [];
                    paperContentUrl = paperConf.content;
                    paperMimeType = paperConf.mime_type;
                    if (!paperContentUrl) throw new Error('Missing paper content URL');
                    let contentData = null;
                    if (paperMimeType === 'text/markdown')
                        contentData = await fetchPaperContent(paperContentUrl, 'text/markdown');
                    else if (paperMimeType === 'application/pdf')
                        contentData = paperContentUrl;
                    else
                        throw new Error(`Unsupported paper type: ${paperMimeType}`);
                    renderPaperContent(contentData, paperMimeType);
                    renderAnswerSheetFromConfig();
                    tryRestoreAnswers();
                    submitBtn.disabled = false;
                    startAutoSave();
                    loadingContainer.style.display = 'none';
                    mainContainer.style.display = 'flex';
                } catch (err) {
                    console.error('Paper loading error:', err);
                    loadingContainer.style.display = 'none';
                    tokenContainer.style.display = 'block';
                    quizStatusMessageDiv.style.display = 'block';
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = '试题加载失败：' + (err.message || '未知错误');
                    tokenInputArea.style.display = 'none';
                    tokenBtn.disabled = true;
                }
            }
            
            async function submitToken() {
                quizStatusMessageDiv.style.display = 'none';
                quizStatusMessageDiv.textContent = '';
                quizStatusMessageDiv.className = 'quiz-status-message info';
                
                const inputToken = tokenInput.value.trim();
                if (!inputToken) {
                    showNotification('请输入访问令牌', 'error');
                    return;
                }
                tokenBtn.disabled = true;
                tokenBtn.textContent = '正在验证';
                const isValid = await verifyToken(inputToken);
                if (isValid) {
                    tokenValue = inputToken;
                    await onTokenVerified();
                } else {
                    tokenBtn.disabled = false;
                    tokenBtn.textContent = '验证';
                }
            }
            
            async function autoVerifyAndLoad() {
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('token');
                if (quizConfig.group === null) {
                    tokenValue = urlToken || '';
                    await onTokenVerified();
                    return;
                }
                if (!urlToken || urlToken.trim() === '') {
                    tokenInputArea.style.display = 'block';
                    return;
                }
                loadingContainer.style.display = 'block';
                tokenContainer.style.display = 'block';
                const verifyResult = await autoVerifyToken(urlToken);
                if (verifyResult.success) {
                    tokenValue = urlToken;
                    await onTokenVerified();
                } else {
                    loadingContainer.style.display = 'none';
                    tokenContainer.style.display = 'block';
                    quizStatusMessageDiv.style.display = 'block';
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = '访问令牌无效，请重新输入';
                    tokenInputArea.style.display = 'block';
                    tokenBtn.disabled = false;
                    tokenBtn.textContent = '验证';
                    const newUrl = window.location.pathname + '?quiz=' + quizId;
                    window.history.replaceState({}, '', newUrl);
                }
            }
            
            document.addEventListener('DOMContentLoaded', async () => {
                const isQuizValid = await fetchQuizConfig();
                if (!isQuizValid) {
                    tokenBtn.disabled = true;
                    return;
                }
                
                tokenBtn.addEventListener('click', submitToken);
                tokenInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitToken(); });
                
                submitBtn.addEventListener('click', showConfirmModal);
                
                modalCancelBtn.addEventListener('click', hideConfirmModal);
                modalConfirmBtn.addEventListener('click', onConfirmSubmit);
                confirmModal.addEventListener('click', (e) => {
                    if (e.target === confirmModal) hideConfirmModal();
                });
                
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(document.body, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\(", right: "\\)", display: false},
                            {left: "\\[", right: "\\]", display: true}
                        ],
                        throwOnError: false
                    });
                }
                
                window.addEventListener('beforeunload', () => {
                    if (mainContainer.style.display === 'flex') autoSaveAnswers();
                });
                
                await autoVerifyAndLoad();
            });
        })();
    </script>
</body>
</html>
