<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>测验作答 - MicroQuizHub</title>
    <link rel="icon" type="image/png" href="/asset/icon.png">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://unpkg.com/fabric-with-erasing@1.0.1/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="/asset/style.css">
</head>
<body>
    <!-- 页面结构保持不变（与提问中相同） -->
    <div class="token-container" id="tokenContainer">
        <h2 class="token-title">测验作答</h2>
        <div id="quizStatusMessage" class="quiz-status-message info">正在校验测验数据</div>
        <div id="tokenInputArea" style="display: none;">
            <div class="token-input">
                <label for="tokenInput">访问令牌：</label>
                <input type="text" id="tokenInput" placeholder="请输入访问令牌">
            </div>
            <button class="token-btn" id="tokenBtn">验证</button>
        </div>
    </div>
    <div class="loading-container" id="loadingContainer" style="display: none;">
        <div class="loading-spinner"></div>
        <p>正在加载试题</p>
    </div>
    <div class="main-container" id="mainContainer">
        <div class="questions-panel">
            <div class="questions-container" id="questionsContainer">
                <div class="question-content" id="questionContent"></div>
            </div>
        </div>
        <div class="answer-panel">
            <div class="answers-container" id="answersContainer">
                <h2 class="panel-title">请在此区域作答</h2>
                <div id="autoSaveStatus" class="auto-save-status" style="display: none;"></div>
                <div id="answerItemsContainer"></div>
                <div class="submit-area">
                    <button class="submit-btn" id="submitBtn" disabled>提交</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-title">确认提交</div>
            <div class="modal-message" id="confirmModalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancelBtn">取消</button>
                <button class="modal-btn confirm" id="modalConfirmBtn">提交</button>
            </div>
        </div>
    </div>
    <script src="/asset/quiz.js"></script>
</body>
</html>
