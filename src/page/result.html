<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>测验结果 - MicroQuizHub</title>
    <link rel="icon" type="image/png" href="/asset/icon.png">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="/asset/style.css">
</head>
<body>
    <div class="token-container" id="tokenContainer">
        <h2 class="token-title">测验结果</h2>
        <div id="quizStatusMessage" class="quiz-status-message info">正在校验测验数据</div>
        <div id="tokenInputArea" style="display: none;">
            <div class="token-input">
                <label for="tokenInput">访问令牌：</label>
                <input type="text" id="tokenInput" placeholder="请输入访问令牌">
            </div>
            <button class="token-btn" id="tokenBtn">验证</button>
        </div>
    </div>
    <div class="loading-container" id="loadingContainer" style="display: none;">
        <div class="loading-spinner"></div>
        <p>正在加载试卷与结果</p>
    </div>
    <div class="main-container" id="mainContainer">
        <div class="questions-panel">
            <div class="questions-container" id="questionsContainer">
                <div class="question-content" id="questionContent"></div>
            </div>
        </div>
        <div class="answer-panel">
            <div class="answers-container" id="answersContainer">
                <h2 class="panel-title" id="resultTitle">请在此区域查看结果</h2>
                <div id="answerItemsContainer"></div>
            </div>
        </div>
    </div>
    <script>
        (function(){
            let quizId = '';
            let tokenValue = '';
            let quizConfig = null;
            let answerSheet = [];
            let paperContentUrl = '';
            let paperMimeType = '';
            
            const tokenContainer = document.getElementById('tokenContainer');
            const loadingContainer = document.getElementById('loadingContainer');
            const mainContainer = document.getElementById('mainContainer');
            const tokenInput = document.getElementById('tokenInput');
            const tokenBtn = document.getElementById('tokenBtn');
            const questionContent = document.getElementById('questionContent');
            const answerItemsContainer = document.getElementById('answerItemsContainer');
            const resultTitle = document.getElementById('resultTitle');
            const quizStatusMessageDiv = document.getElementById('quizStatusMessage');
            const tokenInputArea = document.getElementById('tokenInputArea');
            
            // 英文 message -> 中文提示映射
            const messageZhMap = {
                "Token invalid": "访问令牌无效",
                "Missing token parameter": "缺少访问令牌参数",
                "Result not available for this quiz": "当前测验不允许查询结果",
                "Quiz not found": "测验不存在",
                "Result not found": "未找到结果",
                "Token not found in result": "暂无测验结果",
                "Missing required keys: quiz and token or values are invalid": "请求异常",
                "Submitted, resubmission not allowed": "不允许重复提交",
                "Quiz closed": "测验已截止",
            };
            
            function getZhMessage(engMessage) {
                return messageZhMap[engMessage] || engMessage || "请求异常";
            }
            
            function showNotification(message, type) {
                const existing = document.querySelector('.notification');
                if (existing) existing.remove();
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }
            
            function renderMath(element) {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(element, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\(", right: "\\)", display: false},
                            {left: "\\[", right: "\\]", display: true}
                        ],
                        throwOnError: false
                    });
                }
            }
            
            function normalizeQuizConfig(data) {
                if (typeof data.id !== 'string' || typeof data.paper !== 'string' || data.paper.trim() === '') {
                    return null;
                }
                return {
                    id: data.id,
                    paper: data.paper,
                    group: (data.hasOwnProperty('group') && data.group !== null && typeof data.group === 'string') ? data.group : null,
                    deadline: (data.hasOwnProperty('deadline') && data.deadline !== null) ? Number(data.deadline) : null,
                    allow_resubmit: (data.hasOwnProperty('allow_resubmit') && typeof data.allow_resubmit === 'boolean') ? data.allow_resubmit : false
                };
            }
            
            async function fetchQuizConfig() {
                const urlParams = new URLSearchParams(window.location.search);
                quizId = urlParams.get('quiz');
                if (!quizId) {
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = '未选择测验';
                    tokenInputArea.style.display = 'none';
                    tokenBtn.disabled = true;
                    return false;
                }
                try {
                    const response = await fetch(`/quiz/${quizId}`);
                    if (response.status === 404) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '测验不存在';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    } else if (response.status === 500) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '服务器异常';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    } else if (!response.ok) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '测验数据获取失败';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    }
                    const data = await response.json();
                    const normalized = normalizeQuizConfig(data);
                    if (!normalized) {
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '测验数据异常';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    }
                    quizConfig = normalized;
                    
                    quizStatusMessageDiv.style.display = 'none';
                    
                    if (quizConfig.group === null) {
                        quizStatusMessageDiv.style.display = 'block';
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '当前测验不允许查询结果';
                        tokenInputArea.style.display = 'none';
                        tokenBtn.disabled = true;
                        return false;
                    }
                    
                    tokenInputArea.style.display = 'block';
                    tokenBtn.disabled = false;
                    return true;
                } catch (err) {
                    console.error('Fetch quiz config error:', err);
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = '测验数据异常';
                    tokenInputArea.style.display = 'none';
                    tokenBtn.disabled = true;
                    return false;
                }
            }
            
            async function fetchResult(token, silent = false) {
                try {
                    const url = `/result/${quizId}?token=${encodeURIComponent(token)}`;
                    const response = await fetch(url);
                    
                    let data = null;
                    try {
                        data = await response.json();
                    } catch (e) {}
                    
                    if (response.status === 400) {
                        let engMsg = (data && data.message) ? data.message : 'Bad Request';
                        let zhMsg = getZhMessage(engMsg);
                        if (!silent) {
                            quizStatusMessageDiv.style.display = 'block';
                            quizStatusMessageDiv.className = 'quiz-status-message';
                            quizStatusMessageDiv.textContent = zhMsg;
                        }
                        return { success: false, code: 1, message: zhMsg };
                    }
                    if (response.status === 404) {
                        let engMsg = (data && data.message) ? data.message : 'Not Found';
                        let zhMsg = getZhMessage(engMsg);
                        if (!silent) {
                            quizStatusMessageDiv.style.display = 'block';
                            quizStatusMessageDiv.className = 'quiz-status-message';
                            quizStatusMessageDiv.textContent = zhMsg;
                        }
                        return { success: false, code: 2, message: zhMsg };
                    }
                    if (response.status === 500) {
                        if (!silent) {
                            quizStatusMessageDiv.style.display = 'block';
                            quizStatusMessageDiv.className = 'quiz-status-message';
                            quizStatusMessageDiv.textContent = '服务器异常';
                        }
                        return { success: false, code: -1, message: '服务器异常' };
                    }
                    if (!response.ok) {
                        if (!silent) {
                            quizStatusMessageDiv.style.display = 'block';
                            quizStatusMessageDiv.className = 'quiz-status-message';
                            quizStatusMessageDiv.textContent = '请求异常';
                        }
                        return { success: false, code: -1, message: '请求异常' };
                    }
                    
                    if (data && typeof data === 'object' && Array.isArray(data.result)) {
                        if (data.token !== token) {
                            if (!silent) {
                                quizStatusMessageDiv.style.display = 'block';
                                quizStatusMessageDiv.className = 'quiz-status-message';
                                quizStatusMessageDiv.textContent = '返回数据与访问令牌不匹配';
                            }
                            return { success: false, code: -1, message: '访问令牌不匹配' };
                        }
                        return { success: true, data: data };
                    } else {
                        if (!silent) {
                            quizStatusMessageDiv.style.display = 'block';
                            quizStatusMessageDiv.className = 'quiz-status-message';
                            quizStatusMessageDiv.textContent = '结果数据格式异常';
                        }
                        return { success: false, code: -1, message: '数据格式异常' };
                    }
                } catch (err) {
                    console.error('Fetch result error:', err);
                    if (!silent) {
                        quizStatusMessageDiv.style.display = 'block';
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = `网络错误：${err.message}`;
                    }
                    return { success: false, code: -1, message: err.message };
                }
            }
            
            async function fetchPaperConfig(paperId) {
                try {
                    const response = await fetch(`/paper/${paperId}`);
                    if (response.status === 500) throw new Error('Server error (500)');
                    if (!response.ok) {
                        if (response.status === 404) throw new Error('Paper data error: 404');
                        throw new Error(`Paper data error: HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    if (!data.hasOwnProperty('content') || typeof data.content !== 'string' || data.content.trim() === '')
                        throw new Error('Paper data error: missing content field');
                    if (!data.hasOwnProperty('mime_type') || !['text/markdown', 'application/pdf'].includes(data.mime_type))
                        throw new Error('Paper data error: missing or unsupported mime_type');
                    if (!data.hasOwnProperty('paper') || !Array.isArray(data.paper))
                        throw new Error('Paper data error: missing or invalid paper field');
                    for (let i = 0; i < data.paper.length; i++) {
                        const item = data.paper[i];
                        if (!item.type || !['single_selection', 'multiple_selection', 'single_line', 'multiple_line', 'graphic'].includes(item.type))
                            throw new Error(`Paper data error: invalid type for question ${i+1}`);
                        if (typeof item.prompt !== 'string')
                            throw new Error(`Paper data error: missing prompt for question ${i+1}`);
                        if ((item.type === 'single_selection' || item.type === 'multiple_selection') && (!Array.isArray(item.option) || item.option.length === 0))
                            throw new Error(`Paper data error: missing options for question ${i+1}`);
                    }
                    return data;
                } catch (err) {
                    if (err.message.startsWith('Paper data error')) throw err;
                    else throw new Error(`Request error: ${err.message}`);
                }
            }
            
            async function fetchPaperContent(url, mimeType) {
                if (mimeType === 'text/markdown') {
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Failed to load paper content: HTTP ${resp.status}`);
                    return await resp.text();
                } else if (mimeType === 'application/pdf') {
                    return url;
                } else {
                    throw new Error(`Unsupported paper format: ${mimeType}`);
                }
            }
            
            function renderPaperContent(contentData, mimeType) {
                questionContent.innerHTML = '';
                if (mimeType === 'text/markdown' && typeof contentData === 'string') {
                    questionContent.innerHTML = typeof marked !== 'undefined' ? marked.parse(contentData) : `<pre>${contentData}</pre>`;
                    renderMath(questionContent);
                } else if (mimeType === 'application/pdf' && typeof contentData === 'string') {
                    const iframe = document.createElement('iframe');
                    iframe.src = contentData;
                    iframe.className = 'pdf-embed';
                    iframe.setAttribute('frameborder', '0');
                    questionContent.appendChild(iframe);
                } else {
                    questionContent.innerHTML = '<div class="unsupported-format">当前试卷格式不支持预览</div>';
                    throw new Error('Render failed: unsupported paper format');
                }
            }
            
            function renderResultAnswerSheet(resultArray) {
                answerItemsContainer.innerHTML = '';
                let totalScore = 0;
                for (let i = 0; i < resultArray.length; i++) {
                    const mark = resultArray[i].mark;
                    if (typeof mark === 'number' && !isNaN(mark)) totalScore += mark;
                }
                resultTitle.textContent = `${tokenValue || '访客'}，总分：${totalScore}`;
                
                answerSheet.forEach((item, idx) => {
                    const resultItem = resultArray[idx] || { answer: null, mark: 0 };
                    const userAnswer = resultItem.answer;
                    const score = (typeof resultItem.mark === 'number' && !isNaN(resultItem.mark)) ? resultItem.mark : 0;
                    
                    const answerItem = document.createElement('div');
                    answerItem.className = 'answer-item';
                    
                    const title = document.createElement('div');
                    title.className = 'answer-item-title';
                    title.textContent = item.prompt;
                    answerItem.appendChild(title);
                    
                    if (item.type === 'single_selection') {
                        const optionsDiv = document.createElement('div');
                        optionsDiv.className = 'options-container';
                        (item.option || []).forEach((opt, optIdx) => {
                            const optDiv = document.createElement('div');
                            optDiv.className = 'option';
                            const radio = document.createElement('input');
                            radio.type = 'radio';
                            radio.disabled = true;
                            if (userAnswer === optIdx || userAnswer === String(optIdx)) radio.checked = true;
                            const label = document.createElement('label');
                            label.textContent = opt;
                            optDiv.appendChild(radio);
                            optDiv.appendChild(label);
                            optionsDiv.appendChild(optDiv);
                        });
                        answerItem.appendChild(optionsDiv);
                    } else if (item.type === 'multiple_selection') {
                        const optionsDiv = document.createElement('div');
                        optionsDiv.className = 'options-container';
                        let selectedSet = new Set();
                        if (Array.isArray(userAnswer)) {
                            selectedSet = new Set(userAnswer.map(v => String(v)));
                        } else if (typeof userAnswer === 'string') {
                            selectedSet = new Set(userAnswer.split(',').map(s => s.trim()));
                        }
                        (item.option || []).forEach((opt, optIdx) => {
                            const optDiv = document.createElement('div');
                            optDiv.className = 'option';
                            const cb = document.createElement('input');
                            cb.type = 'checkbox';
                            cb.disabled = true;
                            if (selectedSet.has(String(optIdx))) cb.checked = true;
                            const label = document.createElement('label');
                            label.textContent = opt;
                            optDiv.appendChild(cb);
                            optDiv.appendChild(label);
                            optionsDiv.appendChild(optDiv);
                        });
                        answerItem.appendChild(optionsDiv);
                    } else if (item.type === 'single_line') {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'text-input';
                        input.value = (typeof userAnswer === 'string') ? userAnswer : '';
                        input.readOnly = true;
                        answerItem.appendChild(input);
                        if (typeof userAnswer === 'string' && userAnswer.trim() !== '' && typeof katex !== 'undefined') {
                            const previewDiv = document.createElement('div');
                            previewDiv.className = 'single-line-preview';
                            try { 
                                katex.render(userAnswer, previewDiv, { throwOnError: false, displayMode: false }); 
                            } catch(e) { 
                                previewDiv.textContent = userAnswer; 
                            }
                            answerItem.appendChild(previewDiv);
                        }
                    } else if (item.type === 'multiple_line') {
                        const textarea = document.createElement('textarea');
                        textarea.className = 'textarea-input';
                        textarea.value = (typeof userAnswer === 'string') ? userAnswer : '';
                        textarea.readOnly = true;
                        answerItem.appendChild(textarea);
                        if (typeof userAnswer === 'string' && userAnswer.trim() !== '' && typeof katex !== 'undefined') {
                            const previewDiv = document.createElement('div');
                            previewDiv.className = 'multiple-line-preview';
                            try { 
                                katex.render(userAnswer, previewDiv, { throwOnError: false, displayMode: true }); 
                            } catch(e) { 
                                previewDiv.textContent = userAnswer; 
                            }
                            answerItem.appendChild(previewDiv);
                        }
                    } else if (item.type === 'graphic') {
                        const imgWrapper = document.createElement('div');
                        imgWrapper.className = 'graphic-result-wrapper';
                        
                        if (userAnswer && typeof userAnswer === 'string' && userAnswer.startsWith('data:image')) {
                            const img = document.createElement('img');
                            img.src = userAnswer;
                            img.alt = '作答图片';
                            img.className = 'graphic-result-image';
                            imgWrapper.appendChild(img);
                        } else {
                            const placeholder = document.createElement('div');
                            placeholder.className = 'graphic-result-placeholder';
                            placeholder.textContent = '（无作答内容）';
                            imgWrapper.appendChild(placeholder);
                        }
                        answerItem.appendChild(imgWrapper);
                    }
                    
                    const scoreDiv = document.createElement('div');
                    scoreDiv.className = 'question-score';
                    scoreDiv.textContent = `得分：${score}`;
                    answerItem.appendChild(scoreDiv);
                    
                    answerItemsContainer.appendChild(answerItem);
                });
            }
            
            async function loadResultAndPaper(token, entry) {
                tokenValue = token;
                const resultArray = entry.result;
                
                const paperId = quizConfig.paper;
                if (!paperId) throw new Error('Missing paper info');
                const paperConf = await fetchPaperConfig(paperId);
                answerSheet = paperConf.paper || [];
                paperContentUrl = paperConf.content;
                paperMimeType = paperConf.mime_type;
                if (!paperContentUrl) throw new Error('Missing paper content URL');
                
                let contentData = null;
                if (paperMimeType === 'text/markdown')
                    contentData = await fetchPaperContent(paperContentUrl, 'text/markdown');
                else if (paperMimeType === 'application/pdf')
                    contentData = paperContentUrl;
                else
                    throw new Error(`Unsupported paper type: ${paperMimeType}`);
                
                renderPaperContent(contentData, paperMimeType);
                renderResultAnswerSheet(resultArray);
                
                loadingContainer.style.display = 'none';
                mainContainer.style.display = 'flex';
                tokenContainer.style.display = 'none';
            }
            
            async function submitToken() {
                quizStatusMessageDiv.style.display = 'none';
                quizStatusMessageDiv.textContent = '';
                quizStatusMessageDiv.className = 'quiz-status-message info';
                
                const inputToken = tokenInput.value.trim();
                if (!inputToken) {
                    showNotification('请输入访问令牌', 'error');
                    return;
                }
                tokenBtn.disabled = true;
                tokenBtn.textContent = '正在验证';
                
                const resultResp = await fetchResult(inputToken, true);
                if (!resultResp.success) {
                    showNotification(resultResp.message || '访问令牌无效', 'error');
                    tokenBtn.disabled = false;
                    tokenBtn.textContent = '验证';
                    return;
                }
                
                try {
                    await loadResultAndPaper(inputToken, resultResp.data);
                } catch (err) {
                    console.error('Loading error:', err);
                    showNotification('加载失败：' + err.message, 'error');
                    tokenBtn.disabled = false;
                    tokenBtn.textContent = '验证';
                    tokenContainer.style.display = 'block';
                    loadingContainer.style.display = 'none';
                }
            }
            
            async function autoFetchAndLoad() {
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('token');
                
                if (!urlToken || urlToken.trim() === '') {
                    tokenInputArea.style.display = 'block';
                    return;
                }
                loadingContainer.style.display = 'block';
                tokenContainer.style.display = 'block';
                
                const resultResp = await fetchResult(urlToken, true);
                if (resultResp.success) {
                    try {
                        await loadResultAndPaper(urlToken, resultResp.data);
                    } catch (err) {
                        console.error('Loading error:', err);
                        loadingContainer.style.display = 'none';
                        tokenContainer.style.display = 'block';
                        quizStatusMessageDiv.style.display = 'block';
                        quizStatusMessageDiv.className = 'quiz-status-message';
                        quizStatusMessageDiv.textContent = '加载试卷或结果失败：' + (err.message || '未知错误');
                        tokenInputArea.style.display = 'block';
                    }
                } else {
                    loadingContainer.style.display = 'none';
                    tokenContainer.style.display = 'block';
                    quizStatusMessageDiv.style.display = 'block';
                    quizStatusMessageDiv.className = 'quiz-status-message';
                    quizStatusMessageDiv.textContent = resultResp.message || '返回数据异常';
                    tokenInputArea.style.display = 'block';
                    tokenBtn.disabled = false;
                    tokenBtn.textContent = '验证';
                    const newUrl = window.location.pathname + '?quiz=' + quizId;
                    window.history.replaceState({}, '', newUrl);
                }
            }
            
            document.addEventListener('DOMContentLoaded', async () => {
                const isQuizValid = await fetchQuizConfig();
                if (!isQuizValid) {
                    tokenBtn.disabled = true;
                    return;
                }
                tokenBtn.addEventListener('click', submitToken);
                tokenInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitToken(); });
                
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(document.body, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\(", right: "\\)", display: false},
                            {left: "\\[", right: "\\]", display: true}
                        ],
                        throwOnError: false
                    });
                }
                
                await autoFetchAndLoad();
            });
        })();
    </script>
</body>
</html>
